<div class="page-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">🐾 SaúdePet</div>
    <nav class="sidebar-nav">
      <a routerLink="/home" routerLinkActive="active">Home</a>
      <a routerLink="/tutor" routerLinkActive="active">Tutores</a>
      <a routerLink="/animal" routerLinkActive="active">Animais</a>
      <a routerLink="/agendamento" routerLinkActive="active">Agendamentos</a>
    </nav>
    <button class="btn-sair" (click)="logout()">Sair</button>
  </aside>

  <main class="page-content">

    <header class="page-header">
      <h1>Bem-vindo</h1>
      <p>Sistema de Gestão — SaúdePet Clinic</p>
    </header>

    <div class="atalhos">
      <a routerLink="/tutor" class="atalho-card">
        <span class="atalho-icon">👤</span>
        <span>Cadastrar tutor</span>
      </a>
      <a routerLink="/animal" class="atalho-card">
        <span class="atalho-icon">🐶</span>
        <span>Cadastrar animal</span>
      </a>
      <a routerLink="/agendamento" class="atalho-card">
        <span class="atalho-icon">📅</span>
        <span>Novo agendamento</span>
      </a>
    </div>

  </main>
</div>

<div class="page-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">🐾 SaúdePet</div>
    <nav class="sidebar-nav">
      <a routerLink="/home" routerLinkActive="active">Home</a>
      <a routerLink="/tutor" routerLinkActive="active">Tutores</a>
      <a routerLink="/animal" routerLinkActive="active">Animais</a>
      <a routerLink="/agendamento" routerLinkActive="active">Agendamentos</a>
    </nav>
  </aside>

  <main class="page-content">

    <header class="page-header">
      <h1>Tutores</h1>
      <p>Cadastro de responsáveis pelos animais.</p>
    </header>

    <section class="card">
      <h2>Novo tutor</h2>

      <div class="form-grid">

        <div class="campo">
          <label>Nome completo</label>
          <input type="text" [(ngModel)]="nome" placeholder="João Silva">
        </div>

        <div class="campo">
          <label>Telefone</label>
          <input type="text" [(ngModel)]="telefone" (input)="formatarTelefone()" placeholder="(45) 99999-9999">
        </div>

        <div class="campo campo-full">
          <label>E-mail</label>
          <input type="email" [(ngModel)]="email" placeholder="joao@email.com">
        </div>

      </div>

      <div class="form-actions">
        <button class="btn-primary" (click)="salvar()" [disabled]="carregando">
          {{ carregando ? 'Salvando…' : 'Salvar tutor' }}
        </button>
      </div>

      <p class="msg-erro" *ngIf="erro">{{ erro }}</p>
      <p class="msg-sucesso" *ngIf="sucesso">{{ sucesso }}</p>
    </section>

    <section class="card">
      <h2>Tutores cadastrados</h2>

      <div class="vazio" *ngIf="tutores.length === 0">
        Nenhum tutor cadastrado ainda.
      </div>

      <table *ngIf="tutores.length > 0">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th>E-mail</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let t of tutores">
            <td>{{ t.nome }}</td>
            <td>{{ t.telefone }}</td>
            <td>{{ t.email }}</td>
          </tr>
        </tbody>
      </table>
    </section>

  </main>
</div>

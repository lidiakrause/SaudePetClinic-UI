<header class="page-header">
  <h1>Agendamentos</h1>
  <p>Consultas e atendimentos marcados.</p>
</header>

<section class="card">
  <h2>Novo agendamento</h2>

  <div class="form-grid">
    <div class="campo">
      <label>Animal</label>
      <select [(ngModel)]="animalId">
        <option [ngValue]="null">Selecione um animal</option>
        <option *ngFor="let a of animais" [ngValue]="a.id">{{ a.nome }}</option>
      </select>
    </div>

    <div class="campo">
      <label>Data e hora</label>
      <input type="datetime-local" [(ngModel)]="dataHora">
    </div>

    <div class="campo campo-full">
      <label>Serviço</label>
      <select [(ngModel)]="servico">
        <option value="">Selecione</option>
        <option value="Consulta">Consulta</option>
        <option value="Castração">Castração</option>
        <option value="Retorno">Retorno</option>
      </select>
    </div>
  </div>

  <div class="form-actions">
    <button class="btn-primary" (click)="salvar()" [disabled]="carregando">
      {{ carregando ? 'Salvando…' : 'Agendar' }}
    </button>
  </div>

  <p class="msg-erro" *ngIf="erro">{{ erro }}</p>
  <p class="msg-sucesso" *ngIf="sucesso">{{ sucesso }}</p>
</section>

<section class="card">
  <h2>Agendamentos marcados</h2>

  <div class="vazio" *ngIf="agendamentos.length === 0">
    Nenhum agendamento encontrado.
  </div>

  <table *ngIf="agendamentos.length > 0">
    <thead>
      <tr>
        <th>Animal</th>
        <th>Serviço</th>
        <th>Data e hora</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let ag of agendamentos">
        <td>{{ ag.animal?.nome }}</td>
        <td>{{ ag.servico }}</td>
        <td>{{ formatarDataHora(ag.dataHora) }}</td>
      </tr>
    </tbody>
  </table>
</section>

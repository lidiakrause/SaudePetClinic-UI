<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <span>💼</span>
      <h1>Recepção</h1>
    </div>
    <h3>Área da Recepcionista</h3>

    <form (ngSubmit)="login()" style="display: flex; flex-direction: column; gap: 16px;">
      <div class="campo">
        <label for="cnpj">CNPJ</label>
        <input
          type="text"
          id="cnpj"
          name="cnpj"
          [(ngModel)]="cnpj"
          (input)="formatarCnpj()"
          placeholder="00.000.000/0001-00"
          autocomplete="username"
          required
        />
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          name="senha"
          [(ngModel)]="senha"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <p class="msg-erro" *ngIf="erro">{{ erro }}</p>

      <button type="submit" class="btn-primary" style="width: 100%; margin-top: 4px;">Entrar</button>
    </form>
    
    <a routerLink="/" class="btn-voltar">⬅ Voltar ao início</a>
  </div>
</div>

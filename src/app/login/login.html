<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <span>🐾</span>
      <h1>SaúdePetClinic</h1>
    </div>
    <h3>Acesso ao Sistema</h3>

    <form (ngSubmit)="login()" style="display: flex; flex-direction: column; gap: 16px;">
      <div class="campo">
        <label for="cpf">CPF</label>
        <input 
          type="text" 
          id="cpf" 
          name="cpf" 
          [(ngModel)]="cpf" 
          (input)="formatarCpf()" 
          placeholder="000.000.000-00" 
          maxlength="14" 
          required
        />
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input 
          type="password" 
          id="senha" 
          name="senha" 
          [(ngModel)]="senha" 
          placeholder="Digite sua senha" 
          required
        />
      </div>

      <p class="msg-erro" *ngIf="erro">{{ erro }}</p>

      <button type="submit" class="btn-primary" style="width: 100%; margin-top: 4px;">Entrar</button>
    </form>
  </div>
</div>

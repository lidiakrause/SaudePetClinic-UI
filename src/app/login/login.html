<div class="login-wrapper">

  <div class="login-card">

    <div class="login-logo">
      <span>🐾</span>
      <h1>SaúdePet <strong>Clinic</strong></h1>
    </div>

    <div class="campo">
      <label>CNPJ</label>
      <input
        type="text"
        [(ngModel)]="cnpj"
        (input)="formatarCnpj()"
        placeholder="00.000.000/0001-00"
        autocomplete="username"
      >
    </div>

    <div class="campo">
      <label>Senha</label>
      <input
        type="password"
        [(ngModel)]="senha"
        placeholder="••••••••"
        autocomplete="current-password"
        (keyup.enter)="login()"
      >
    </div>

    <p class="msg-erro" *ngIf="erro">{{ erro }}</p>

    <button class="btn-primary" (click)="login()">Entrar</button>

  </div>

</div>
